name: Deploy Web To Workers

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true
          run-install: true

      - name: Build website
        run: vp run website#build

      - name: Verify Cloudflare auth
        working-directory: apps/website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: vp exec wrangler whoami --config wrangler.jsonc

      - name: Deploy website to Cloudflare Workers
        working-directory: apps/website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_WORKER_NAME: ${{ vars.CF_WORKER_NAME }}
        run: |
          WORKER_NAME="${CF_WORKER_NAME:-underwritten-web}"
          vp exec wrangler deploy --config wrangler.jsonc --name "$WORKER_NAME"
