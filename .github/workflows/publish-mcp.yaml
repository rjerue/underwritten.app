name: Publish underwritten-mcp

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true
          run-install: true

      - name: Setup npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Build package
        working-directory: apps/mcp
        run: vp run build

      - name: Check npm for existing version
        id: version_check
        working-directory: apps/mcp
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if vp info "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --json >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: ${{ steps.version_check.outputs.already_published != 'true' }}
        working-directory: apps/mcp
        run: vp pm publish --access public --no-git-checks

      - name: Skip existing version
        if: ${{ steps.version_check.outputs.already_published == 'true' }}
        run: echo "underwritten-mcp version is already published; skipping."
