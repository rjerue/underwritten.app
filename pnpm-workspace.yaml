packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@playwright/test": ^1.58.2
  "@types/node": ^24.12.0
  fflate: ^0.8.2
  mermaid: ^11.13.0
  react-router-dom: ^7.13.1
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
